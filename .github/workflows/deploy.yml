name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Scopes secrets.SUPABASE_URL / secrets.SUPABASE_ANON_KEY below to the
    # "production" GitHub Environment (Settings → Environments), not plain
    # repo-level secrets. Swapping Supabase projects later = updating the
    # secrets on that one environment.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          printf 'window.SUPABASE_CONFIG = {\n  url: "%s",\n  anonKey: "%s"\n};\n' "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > config.js
          test -s config.js || (echo "::error::config.js was not created" && exit 1)
          echo "Generated config.js ($(wc -c < config.js) bytes):"
          cat config.js
          echo "deploy debug $(date -u)" > deploy-debug.txt
          echo "--- workspace root listing ---"
          ls -la

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
